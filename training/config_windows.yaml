# ============================================================
# WeiqiBoardDetect — Windows 训练配置文件
# ============================================================
# 使用前：把下面所有 TODO 路径改为你的 Windows 实际路径
# 使用正斜杠 / 或双反斜杠 \\ 均可（Python 两种都接受）

# ── 数据源路径 ─────────────────────────────────────────────
data:
  # Gomrade 数据集根目录
  gomrade_dir: "TODO: C:/Users/yourname/Data/Gomrade-dataset1"

  # patch 目录（从 Mac 复制过来的 patches/ 文件夹）
  patches_dir: "TODO: C:/Users/yourname/WeiqiBoardDetect/training/patches"

  val_ratio:  0.15
  test_ratio: 0.05

# ── 模型配置 ────────────────────────────────────────────────
model:
  arch:        "StoneCNN"   # 或 "MobileNetV3"
  patch_size:  48
  num_classes: 3

  # checkpoint 和结果保存目录
  output_dir: "TODO: C:/Users/yourname/WeiqiBoardDetect/training/checkpoints"

# ── 训练超参数（Windows GTX1080 推荐配置）────────────────────
train:
  epochs:      150           # 比 Mac 跑更多轮，GTX1080 快 10-15x
  batch_size:  32            # 先小 batch 让模型学会，后期再加大
  lr:          0.001
  weight_decay: 0.0001
  num_workers: 0             # Windows 建议先用 0（避免多进程 pickling 问题）
  amp:         true          # CUDA 混合精度，GTX1080 支持，自动加速

  # 采样策略（解决 E 类太多的问题）
  # "equal"  = B:W:E = 1:1:1（之前的方式，导致过多误报）
  # "sqrt"   = 平方根加权，更接近真实分布，推荐
  # "none"   = 原始分布（86% 空格），模型只会预测空格
  sampling_strategy: "sqrt"

  # 子集训练（快速迭代验证参数有效性）
  # 1.0 = 全量数据；0.2 = 只用 20% 数据，速度提升 5x
  subset_ratio: 0.2          # 建议先用 0.2 跑 150 轮，参数对了再换 1.0

# ── 日志 ────────────────────────────────────────────────────
logging:
  log_dir:               "TODO: C:/Users/yourname/WeiqiBoardDetect/training/log"
  save_confusion_matrix: true

# ── 数据增强 ────────────────────────────────────────────────
augment:
  random_flip:     true
  random_rotation: 15
  color_jitter:
    brightness: 0.4
    contrast:   0.4
    saturation: 0.2
    hue:        0.05
  gaussian_blur:   true
