# ============================================================
# WeiqiBoardDetect — Windows 训练配置文件
# ============================================================
# 使用前：把下面所有 TODO 路径改为你的 Windows 实际路径
# 使用正斜杠 / 或双反斜杠 \\ 均可（Python 两种都接受）

# ── 数据源路径 ─────────────────────────────────────────────
data:
  # Gomrade 数据集根目录 (支持多个路径)
  gomrade_dir: 
    - "D:/Codes/Data/Gomrade/dataset2"

  # patch 目录 (支持列表，可同时加载多个数据集的图块)
  patches_dir: 
    - "D:/Codes/Data/Gomrade/dataset2/patches"

  val_ratio:  0.15
  test_ratio: 0.05

# ── 模型配置 ────────────────────────────────────────────────
model:
  arch:        "MobileNetV3"   # 升级到更强的工业级模型
  patch_size:  48
  num_classes: 3

  # checkpoint 和结果保存目录
  output_dir: "D:/Codes/WeiqiBoardDetect/WeiqiBoardDetect-main/training/checkpoints"

# ── 训练超参数（Windows GTX1080 推荐配置）────────────────────
train:
  epochs:      30            # 30 轮快速实验（针对 Dataset1 清理后效果验证）
  batch_size:  64            # GTX 1080 8GB 显存建议尝试 64，速度更快
  lr:          0.001
  weight_decay: 0.0001
  num_workers: 2             # 降低到 2，减少机械硬盘（HDD）的磁头争抢，防止读图卡死
  amp:         true          # CUDA 混合精度，GTX1080 支持，自动加速

  # 采样策略（解决 E 类太多的问题）
  # "equal"  = B:W:E = 1:1:1（之前的方式，导致过多误报）
  # "sqrt"   = 平方根加权，更接近真实分布，推荐
  # "none"   = 原始分布（86% 空格），模型只会预测空格
  sampling_strategy: "sqrt"      # 回归更平衡的策略，避免过激误报

  # 子集训练（快速迭代验证参数有效性）
  # 1.0 = 全量数据；0.2 = 只用 20% 数据，速度提升 5x
  subset_ratio: 1.0          # [最终冲击] 全量 100% 数据训练

# ── 日志 ────────────────────────────────────────────────────
logging:
  log_dir:               "D:/Codes/WeiqiBoardDetect/WeiqiBoardDetect-main/training/log"
  save_confusion_matrix: true

# ── 数据增强 ────────────────────────────────────────────────
augment:
  random_flip:     true
  random_rotation: 15
  color_jitter:
    brightness: 0.4
    contrast:   0.4
    saturation: 0.2
    hue:        0.05
  gaussian_blur:   true
# ── 实验性：尺寸启发式修正 ──────────────────────────────────
# 针对白子误判光点的问题，在评估时引入面积过滤
heuristic:
  white_area_filter: true
  min_area_ratio: 0.10       # 白色区域至少占 10% 面积才认为是棋子
