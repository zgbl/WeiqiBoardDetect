# ============================================================
# WeiqiBoardDetect — 合成数据训练配置 (Windows GTX1080)
# ============================================================

data:
  # 合成 patch 目录（generate_win.py 生成的 B/ W/ E/ 目录）
  patches_dir:
    - "D:/Codes/Data/Gomrade/dataset1/patches_syn"

  val_ratio:  0.15
  test_ratio: 0.05

model:
  arch:        "MobileNetV3"
  patch_size:  48
  num_classes: 3
  output_dir:  "D:/Codes/WeiqiBoardDetect/WeiqiBoardDetect-main/training/checkpoints_syn"

train:
  epochs:      60
  batch_size:  128           # 合成数据干净，可以用更大 batch
  lr:          0.001
  weight_decay: 0.0001
  num_workers: 0             # Windows HDD + RAM预加载，用0
  amp:         true          # GTX1080 混合精度加速
  sampling_strategy: "sqrt"
  subset_ratio: 1.0

logging:
  log_dir: "D:/Codes/WeiqiBoardDetect/WeiqiBoardDetect-main/training/log_syn"
  save_confusion_matrix: true

augment:
  random_flip:     true
  random_rotation: 15
  color_jitter:
    brightness: 0.4
    contrast:   0.4
    saturation: 0.2
    hue:        0.05

heuristic:
  white_area_filter: false   # 合成数据无需过滤
